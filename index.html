<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Layanan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <section class="card">
            <h2>Form Pengajuan Layanan</h2>

            <form id="form">

                <label for="nama">Nama</label>
                <input type="text" id="nama" placeholder="Masukkan nama" maxlength="30" required>

                <label for="nim">NIM</label>
                <input type="text" id="nim" placeholder="Masukkan NIM" maxlength="10" required>

                <label for="layanan">Jenis Layanan</label>
                <select id="layanan" required>
                    <option value="">-- Pilih Layanan --</option>
                    <option value="Konsultasi">Konsultasi</option>
                    <option value="Pendaftaran">Pendaftaran</option>
                    <option value="Pengaduan">Pengaduan</option>
                    <option value="Informasi">Informasi</option>
                </select>

                <label for="keterangan">Keterangan</label>
                <textarea id="keterangan" placeholder="Masukkan keterangan" required></textarea>

                <button type="submit">Simpan</button>
                <a href="tabel.html">
                    <button type="button">Lihat Data</button>
                </a>

            </form>
        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
