<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Data Pengajuan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="card">

        <h2>Data Pengajuan Layanan</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Jenis Layanan</th>
                    <th>Keterangan</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="tabelData">

            </tbody>
        </table>

        <br>

        <a href="index.html">
            <button>Kembali</button>
        </a>

    </section>

</div>

<script>

let data = JSON.parse(localStorage.getItem("pengajuan")) || [];

const tabel = document.getElementById("tabelData");

tampilkan();

function tampilkan(){

    tabel.innerHTML = "";

    data.forEach((item,index)=>{

        tabel.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${item.nama}</td>
            <td>${item.nim}</td>
            <td>${item.layanan}</td>
            <td>${item.keterangan}</td>
            <td>
                <button onclick="hapus(${index})">Hapus</button>
            </td>
        </tr>
        `;

    });

}

function hapus(index){

    if(confirm("Hapus data?")){

        data.splice(index,1);

        localStorage.setItem("pengajuan",JSON.stringify(data));

        tampilkan();

    }

}

</script>

</body>
</html>
